# =============================================================================
# Configuração do Tenant: OPS Solutions
# =============================================================================
# O system_prompt é GERADO AUTOMATICAMENTE dos dados abaixo.
# Basta preencher os dados da empresa e o agente sabe como se comportar.
# =============================================================================

# --- Informações da Empresa (OBRIGATÓRIO) ---
company:
  name: "OPS Solutions"
  segment: "Tecnologia, Automação e Inteligência Artificial"
  contact_name: "Rafael"
  description: >
    Empresa especializada em desenvolvimento de software,
    automações empresariais e soluções de inteligência artificial
    para empresas de todos os portes.

  website: "https://ops-solutions.com"

  services:
    - Automação de WhatsApp e atendimento
    - Desenvolvimento de APIs e integrações
    - Desenvolvimento de software personalizado
    - CRM White Label
    - Inteligência Artificial e RAG
    - Integrações entre sistemas (n8n, Make, webhooks)
    - Infraestrutura e hospedagem em servidores VPS
    - Manutenção e suporte técnico

  catalog:
    - name: "Automação de WhatsApp"
      description: "Chatbot inteligente com IA para atendimento automático"
      price_range: "A partir de R$ 1.500"

    - name: "Integração de Sistemas"
      description: "Conecte seu CRM, ERP e ferramentas via API"
      price_range: "A partir de R$ 2.000"

    - name: "Sistema Personalizado"
      description: "Software sob medida para sua empresa"
      price_range: "A partir de R$ 5.000"

    - name: "IA Generativa / RAG"
      description: "IA treinada com os dados da sua empresa"
      price_range: "A partir de R$ 3.000"

    - name: "CRM White Label"
      description: "CRM completo com sua marca"
      price_range: "Sob consulta"

# --- Identidade do Agente ---
agent:
  name: "Assistente OPS Solutions"
  personality: "Consultivo, direto e empático"
  language: "pt-BR"
  # system_prompt: deixe vazio para gerar automaticamente dos dados acima!

# --- Filtro de Tópicos ---
topics:
  allowed:
    - suporte ao cliente
    - serviços da empresa
    - automações
    - desenvolvimento de software
    - inteligência artificial
    - preços e planos
    - agendamentos

  blocked:
    - política
    - religião
    - concorrentes
    - assuntos pessoais

# --- Horário de Atendimento ---
business_hours:
  timezone: "America/Sao_Paulo"
  schedule:
    monday_friday: "00:00-23:59"
    saturday: "00:00-23:59"
    sunday: "00:00-23:59"
  out_of_hours_message: >
    Estamos disponíveis 24 horas por dia, 7 dias por semana!
    Como posso ajudar?

# --- Escalação para Humano ---
escalation:
  trigger_keywords:
    - "falar com humano"
    - "atendente"
    - "gerente"
    - "reclamação"
  action: "webhook"
  webhook_url: "https://exemplo.com/api/escalation"
  message: "Vou te conectar com nossa equipe. Aguarde um momento!"

# --- Cache Semântico ---
cache:
  semantic_threshold: 0.92
  ttl_hours: 24

# --- Webhooks de Eventos ---
webhooks:
  events:
    - message_received
    - escalation_triggered
  endpoint: "https://exemplo.com/webhooks/agent"
  secret: "mude-este-secret-em-producao"
