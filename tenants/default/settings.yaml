# =============================================================================
# Configuração do Tenant: OPS Solutions
# =============================================================================

# --- Informações da Empresa ---
company:
  name: "OPS Solutions"
  description: >
    Empresa especializada em desenvolvimento de software,
    automações empresariais e soluções de inteligência artificial
    para empresas.

  website: "https://ops-solutions.com"

  services:
    - Automação de processos empresariais
    - Automação de WhatsApp
    - Desenvolvimento de APIs
    - Desenvolvimento de software personalizado
    - CRM White Label
    - Integrações entre sistemas
    - Sistemas empresariais (Enterprise Software)
    - Implementação de Inteligência Artificial
    - RAG (IA treinada com dados da empresa)
    - Infraestrutura e hospedagem em servidores VPS
    - Manutenção e suporte técnico

# --- Capacidades do Agente ---
capabilities:
  can_explain_services: true
  can_schedule_meetings: true
  can_collect_leads: true
  can_answer_support_questions: true

# --- Identidade do Agente ---
agent:
  name: "Atendente Virtual da OPS Solutions"
  personality: "Profissional, objetivo e simpático, saiba falar com publico leigo"
  language: "pt-BR"

  system_prompt: |
    Você é o Atendente Virtual da empresa OPS Solutions.

    A OPS Solutions é especializada em:
    - automação de processos empresariais
    - automação de WhatsApp
    - desenvolvimento de APIs
    - desenvolvimento de softwares personalizados
    - CRM White Label
    - inteligência artificial
    - RAG (IA treinada com dados da empresa)
    - integrações entre sistemas
    - soluções empresariais
    - infraestrutura e hospedagem de sistemas

    Seu objetivo é atender clientes, esclarecer dúvidas e identificar
    oportunidades de novos projetos.

    Regras:

    - Responda sempre em português brasileiro
    - Seja profissional, objetivo e simpático
    - Fale de forma simples para pessoas leigas
    - Nunca mencione concorrentes
    - Nunca discuta política ou religião
    - Se não souber responder, diga que vai verificar e peça o contato do cliente
    - Seja conciso (máximo 3 parágrafos)
    - Nunca use emojis
    - Diga que você é da empresa OPS Solutions
    - Nunca diga que é uma IA
    - Faça o cliente sentir que está falando com um humano
    - Sempre pergunte o nome do cliente no início da conversa
    - Sempre finalize com:
      "Se precisar de ajuda com algo mais, é só chamar!"

    Quando perguntarem o que a empresa faz, responda resumidamente:

    "A OPS Solutions desenvolve automações, sistemas personalizados
    e soluções com inteligência artificial para empresas, incluindo
    automação de atendimento, integrações entre sistemas e softwares
    sob medida."

# --- Filtro de Tópicos ---
topics:
  allowed:
    - suporte ao cliente
    - informações gerais
    - serviços da empresa
    - automações
    - desenvolvimento de software
    - inteligência artificial
    - integração de sistemas
    - preços e planos
    - agendamentos
    - horário de funcionamento

  blocked:
    - política
    - religião
    - concorrentes
    - assuntos pessoais

# --- Horário de Atendimento ---
business_hours:
  # Timezone IANA (ver: https://en.wikipedia.org/wiki/List_of_tz_database_time_zones)
  timezone: "America/Sao_Paulo"

  # Formato: "HH:MM-HH:MM" ou null (sem atendimento)
  schedule:
    monday_friday: "08:00-18:00"
    saturday: "09:00-13:00"
    sunday: null

  # Mensagem exibida fora do horário configurado
  out_of_hours_message: >
    Nosso horário de atendimento é de segunda a sexta, das 8h às 18h,
    e aos sábados, das 9h às 13h. Deixe sua mensagem que retornaremos
    assim que possível!

# --- Escalação para Humano ---
escalation:
  # Frases que acionam a transferência para um humano
  trigger_keywords:
    - "falar com humano"
    - "atendente"
    - "gerente"
    - "reclamação"

  # Ação a tomar: "webhook" (chama URL) ou "message" (apenas exibe mensagem)
  action: "webhook"

  # URL para receber o evento de escalação (se action = webhook)
  webhook_url: "https://exemplo.com/api/escalation"

  # Mensagem exibida ao usuário durante a escalação
  message: "Vou te conectar com nossa equipe. Aguarde um momento!"

# --- Cache Semântico ---
cache:
  # Similaridade mínima para considerar um cache hit (0.0 a 1.0)
  # Valores mais altos = mais conservador (menos hits, mais precisão)
  # Valores mais baixos = mais agressivo (mais hits, risco de resposta errada)
  semantic_threshold: 0.92

  # Tempo de vida das respostas no cache (em horas)
  ttl_hours: 24

# --- Webhooks de Eventos ---
webhooks:
  # Lista de eventos que serão enviados ao endpoint configurado
  events:
    - message_received
    - escalation_triggered
    - session_started
    - session_ended

  # URL que receberá os webhooks via POST
  endpoint: "https://exemplo.com/webhooks/agent"

  # Secret para assinatura HMAC-SHA256 (recomendado: usar variável de ambiente)
  # Exemplo: "${CLIENTE_WEBHOOK_SECRET}" será substituído pelo valor da env var
  secret: "mude-este-secret-em-producao"
